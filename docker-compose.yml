version: '3.8'

services:
  # PocketBase Backend
  pocketbase:
    image: pocketbase/pocketbase:latest
    container_name: posthub-pocketbase
    environment:
      - POCKETBASE_PORT=8090
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
    restart: unless-stopped
    networks:
      - posthub-network

  # Frontend (nginx)
  frontend:
    image: nginx:alpine
    container_name: posthub-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - pocketbase
    restart: unless-stopped
    networks:
      - posthub-network

networks:
  posthub-network:
    driver: bridge

# ============================================
# USAGE:
# ============================================
# 1. Umieść pliki:
#    - docker-compose.yml
#    - index.html
#    - nginx.conf (poniżej)
#
# 2. Uruchom:
#    docker-compose up -d
#
# 3. Otwórz:
#    http://localhost
#    http://localhost:8090/_/ (Admin Panel)
#
# 4. Zatrzymaj:
#    docker-compose down
#
# ============================================
