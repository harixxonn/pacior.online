<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostHub - Social Media</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Distinctive typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }
        
        :root {
            --primary: #1da1f2;
            --primary-dark: #1a8cd8;
            --bg-primary: #0f1419;
            --bg-secondary: #192734;
            --bg-tertiary: #22303c;
            --text-primary: #e7e9ea;
            --text-secondary: #71767b;
            --border: #2f3336;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .post-card {
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s;
        }
        
        .post-card:hover {
            background-color: var(--bg-secondary);
        }
        
        .btn-primary {
            background-color: var(--primary);
            color: white;
            transition: all 0.2s;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-dark);
            box-shadow: 0 0 15px rgba(29, 161, 242, 0.3);
        }
        
        .btn-secondary {
            border: 1px solid var(--border);
            color: var(--primary);
            border-radius: 20px;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background-color: rgba(29, 161, 242, 0.1);
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #00c9a7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 20px;
        }
        
        .htmx-settling .htmx-swapping {
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }
        
        .htmx-swapping {
            opacity: 1;
            transition: opacity 0.3s ease-in;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        input, textarea {
            background-color: var(--bg-secondary) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-primary) !important;
            border-radius: 12px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px rgba(29, 161, 242, 0.2);
        }
        
        input::placeholder, textarea::placeholder {
            color: var(--text-secondary) !important;
        }
        
        .sidebar {
            border-right: 1px solid var(--border);
        }
        
        .nav-item {
            color: var(--text-primary);
            transition: all 0.2s;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            font-size: 20px;
            font-weight: 500;
        }
        
        .nav-item:hover {
            background-color: rgba(29, 161, 242, 0.1);
            cursor: pointer;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .post-card {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-950">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="sidebar w-64 bg-gray-900 p-4 overflow-y-auto hidden lg:flex lg:flex-col border-r border-gray-700">
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-blue-400">
                    <i class="fas fa-feather"></i> PostHub
                </h1>
            </div>
            
            <nav class="flex-1 space-y-4 mb-8">
                <div class="nav-item active" onclick="navigateTo('home')">
                    <i class="fas fa-home text-2xl"></i>
                    <span>Strona główna</span>
                </div>
                <div class="nav-item" onclick="navigateTo('explore')">
                    <i class="fas fa-compass text-2xl"></i>
                    <span>Odkrywaj</span>
                </div>
                <div class="nav-item" onclick="navigateTo('profile')">
                    <i class="fas fa-user text-2xl"></i>
                    <span>Profil</span>
                </div>
            </nav>
            
            <button id="logoutBtn" class="w-full btn-primary py-3 text-lg font-bold hidden">
                <i class="fas fa-sign-out-alt"></i> Wyloguj się
            </button>
            <button id="loginBtn" class="w-full btn-primary py-3 text-lg font-bold" onclick="showLoginModal()">
                <i class="fas fa-sign-in-alt"></i> Zaloguj się
            </button>
        </div>
        
        <!-- Main Feed -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar (Mobile) -->
            <div class="lg:hidden bg-gray-900 border-b border-gray-700 p-4 flex items-center justify-between">
                <h1 class="text-2xl font-bold text-blue-400">
                    <i class="fas fa-feather"></i> PostHub
                </h1>
                <button onclick="toggleMobileMenu()" class="text-blue-400">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
            </div>
            
            <!-- Feed Content -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Posts Feed -->
                <div class="flex-1 border-r border-gray-700 overflow-y-auto">
                    <!-- Home Timeline Header -->
                    <div class="sticky top-0 bg-gray-900 bg-opacity-80 backdrop-blur border-b border-gray-700 p-4 z-10" id="timelineHeader">
                        <h2 class="text-xl font-bold">Strona główna</h2>
                    </div>
                    
                    <!-- Compose Tweet (only for logged in users) -->
                    <div id="composeSection" class="hidden border-b border-gray-700 p-4">
                        <div class="flex gap-4">
                            <div class="avatar" id="userAvatar">U</div>
                            <div class="flex-1">
                                <textarea 
                                    id="postContent" 
                                    class="w-full text-xl bg-gray-800 text-white rounded-lg p-4 resize-none focus:ring-0"
                                    placeholder="Co się dzieje?!"
                                    rows="3"
                                ></textarea>
                                <div class="flex justify-end gap-2 mt-4">
                                    <button onclick="discardPost()" class="btn-secondary px-6 py-2 font-bold">
                                        Anuluj
                                    </button>
                                    <button 
                                        onclick="submitPost()" 
                                        class="btn-primary px-8 py-2 font-bold disabled:opacity-50 disabled:cursor-not-allowed"
                                        id="postBtn"
                                    >
                                        Posta!
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Posts Feed -->
                    <div id="postsFeed">
                        <div class="flex justify-center items-center h-64">
                            <div class="loader"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Right Sidebar (Desktop only) -->
                <div class="hidden lg:flex lg:flex-col lg:w-80 bg-gray-900 p-4 border-l border-gray-700">
                    <div class="bg-gray-800 rounded-3xl p-4 mb-6">
                        <input 
                            type="text" 
                            placeholder="Szukaj..." 
                            class="w-full px-4 py-3 bg-gray-700 text-white rounded-full focus:ring-0"
                        >
                    </div>
                    
                    <div class="bg-gray-800 rounded-3xl p-4">
                        <h3 class="text-2xl font-bold mb-4">Co się dzieje?</h3>
                        <div class="space-y-4">
                            <div class="hover:bg-gray-700 p-3 rounded cursor-pointer transition">
                                <div class="text-gray-500 text-sm font-bold">#PROGRAMOWANIE na świecie</div>
                                <div class="text-white text-lg font-bold">#JavaScript</div>
                                <div class="text-gray-500 text-sm">5.2M postów</div>
                            </div>
                            <div class="hover:bg-gray-700 p-3 rounded cursor-pointer transition">
                                <div class="text-gray-500 text-sm font-bold">#TECHNOLOGIA na świecie</div>
                                <div class="text-white text-lg font-bold">Web Development</div>
                                <div class="text-gray-500 text-sm">3.8M postów</div>
                            </div>
                            <div class="hover:bg-gray-700 p-3 rounded cursor-pointer transition">
                                <div class="text-gray-500 text-sm font-bold">#CODING na świecie</div>
                                <div class="text-white text-lg font-bold">HTML + CSS + JS</div>
                                <div class="text-gray-500 text-sm">2.1M postów</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-2xl p-8 w-full max-w-md border border-gray-700">
            <h2 class="text-3xl font-bold mb-6">Zaloguj się do PostHub</h2>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Email</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="twoj@email.com"
                        class="w-full px-4 py-3"
                    >
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Hasło</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Twoje hasło"
                        class="w-full px-4 py-3"
                    >
                </div>
            </div>
            
            <button 
                onclick="login()" 
                class="w-full btn-primary py-3 font-bold text-lg mb-4"
            >
                Zaloguj się
            </button>
            
            <div class="text-center text-gray-400 mb-4">lub</div>
            
            <button 
                onclick="showRegisterModal()" 
                class="w-full btn-secondary py-3 font-bold text-lg mb-4"
            >
                Utwórz konto
            </button>
            
            <button 
                onclick="closeLoginModal()" 
                class="w-full px-4 py-2 text-gray-400 hover:text-white transition"
            >
                Zamknij
            </button>
        </div>
    </div>
    
    <!-- Register Modal -->
    <div id="registerModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-2xl p-8 w-full max-w-md border border-gray-700">
            <h2 class="text-3xl font-bold mb-6">Załóż konto</h2>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Nazwa użytkownika</label>
                    <input 
                        type="text" 
                        id="registerUsername" 
                        placeholder="np. jan_kowalski"
                        class="w-full px-4 py-3"
                    >
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Email</label>
                    <input 
                        type="email" 
                        id="registerEmail" 
                        placeholder="twoj@email.com"
                        class="w-full px-4 py-3"
                    >
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Hasło</label>
                    <input 
                        type="password" 
                        id="registerPassword" 
                        placeholder="Silne hasło"
                        class="w-full px-4 py-3"
                    >
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Potwierdź hasło</label>
                    <input 
                        type="password" 
                        id="registerPasswordConfirm" 
                        placeholder="Powtórz hasło"
                        class="w-full px-4 py-3"
                    >
                </div>
            </div>
            
            <button 
                onclick="register()" 
                class="w-full btn-primary py-3 font-bold text-lg mb-4"
            >
                Załóż konto
            </button>
            
            <button 
                onclick="showLoginModal()" 
                class="w-full btn-secondary py-3 font-bold text-lg mb-4"
            >
                Powrót do logowania
            </button>
            
            <button 
                onclick="closeRegisterModal()" 
                class="w-full px-4 py-2 text-gray-400 hover:text-white transition"
            >
                Zamknij
            </button>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50">
        <span id="toastMessage"></span>
    </div>

    <script>
        // ==================== PocketBase Configuration ====================
        // Zamieniaj na swój URL PocketBase
        const PB_URL = 'http://localhost:8090';
        let pb = null;
        let currentUser = null;

        // Initialize PocketBase
        async function initPocketBase() {
            try {
                // Dla development - import z CDN
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/pocketbase@0.20.5/dist/pocketbase.umd.js';
                script.onload = () => {
                    pb = new PocketBase(PB_URL);
                    initializeApp();
                };
                document.head.appendChild(script);
            } catch (error) {
                console.error('Błąd inicjalizacji PocketBase:', error);
                showToast('Błąd połączenia z serwerem', 'error');
            }
        }

        // Initialize app after PocketBase loads
        async function initializeApp() {
            // Check if user is already logged in
            if (pb.authStore.isValid) {
                currentUser = pb.authStore.model;
                showUserInterface();
                loadPosts();
            } else {
                showLoginInterface();
            }

            // Listen for auth changes
            pb.authStore.onChange(() => {
                currentUser = pb.authStore.model;
                if (currentUser) {
                    showUserInterface();
                    loadPosts();
                } else {
                    showLoginInterface();
                }
            });
        }

        // ==================== Authentication ====================
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Wypełnij wszystkie pola', 'error');
                return;
            }

            try {
                const authData = await pb.collection('users').authWithPassword(email, password);
                currentUser = authData.record;
                closeLoginModal();
                showToast('Zalogowano pomyślnie!', 'success');
            } catch (error) {
                console.error('Błąd logowania:', error);
                showToast('Błąd logowania: ' + error.message, 'error');
            }
        }

        async function register() {
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;

            if (!username || !email || !password || !passwordConfirm) {
                showToast('Wypełnij wszystkie pola', 'error');
                return;
            }

            if (password !== passwordConfirm) {
                showToast('Hasła nie zgadzają się', 'error');
                return;
            }

            if (password.length < 8) {
                showToast('Hasło musi mieć min. 8 znaków', 'error');
                return;
            }

            try {
                // Create user record
                const userData = {
                    email: email,
                    password: password,
                    passwordConfirm: passwordConfirm,
                    name: username,
                };

                const record = await pb.collection('users').create(userData);
                
                // Auto-login after registration
                const authData = await pb.collection('users').authWithPassword(email, password);
                currentUser = authData.record;
                closeRegisterModal();
                showToast('Konto utworzone! Zalogowano', 'success');
            } catch (error) {
                console.error('Błąd rejestracji:', error);
                showToast('Błąd rejestracji: ' + error.message, 'error');
            }
        }

        function logout() {
            pb.authStore.clear();
            currentUser = null;
            showToast('Wylogowano', 'success');
        }

        // ==================== UI Management ====================
        function showUserInterface() {
            document.getElementById('composeSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('loginBtn').classList.add('hidden');
            
            if (currentUser && currentUser.name) {
                document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
            }

            document.getElementById('logoutBtn').onclick = logout;
        }

        function showLoginInterface() {
            document.getElementById('composeSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('loginBtn').classList.remove('hidden');
        }

        function showLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function showRegisterModal() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('registerModal').classList.remove('hidden');
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').classList.add('hidden');
            document.getElementById('registerUsername').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('registerPasswordConfirm').value = '';
        }

        // ==================== Posts Management ====================
        async function loadPosts() {
            try {
                const posts = await pb.collection('posts').getList(1, 50, {
                    sort: '-created',
                    expand: 'author'
                });

                let html = '';
                posts.items.forEach(post => {
                    const author = post.expand?.author || {};
                    const createdDate = new Date(post.created).toLocaleDateString('pl-PL');
                    html += `
                        <div class="post-card p-4 border-b border-gray-700 hover:bg-gray-900 transition cursor-pointer">
                            <div class="flex gap-4">
                                <div class="avatar">${(author.name || 'U').charAt(0).toUpperCase()}</div>
                                <div class="flex-1">
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold">${author.name || 'Anonimowy'}</span>
                                        <span class="text-gray-500">@${author.email?.split('@')[0] || 'user'}</span>
                                        <span class="text-gray-500">·</span>
                                        <span class="text-gray-500 text-sm">${createdDate}</span>
                                    </div>
                                    <p class="mt-2 text-white whitespace-pre-wrap break-words">${escapeHtml(post.content)}</p>
                                    <div class="flex gap-8 mt-4 text-gray-500 text-sm max-w-md">
                                        <div class="hover:text-blue-400 transition flex items-center gap-2 cursor-pointer">
                                            <i class="fas fa-comment"></i> 0
                                        </div>
                                        <div class="hover:text-green-400 transition flex items-center gap-2 cursor-pointer">
                                            <i class="fas fa-retweet"></i> 0
                                        </div>
                                        <div class="hover:text-red-400 transition flex items-center gap-2 cursor-pointer">
                                            <i class="fas fa-heart"></i> 0
                                        </div>
                                        <div class="hover:text-blue-400 transition flex items-center gap-2 cursor-pointer">
                                            <i class="fas fa-share"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                if (posts.items.length === 0) {
                    html = `
                        <div class="flex flex-col items-center justify-center h-64 text-gray-500">
                            <i class="fas fa-feather text-5xl mb-4"></i>
                            <p class="text-lg">Brak postów. Bądź pierwszy!</p>
                        </div>
                    `;
                }

                document.getElementById('postsFeed').innerHTML = html;
            } catch (error) {
                console.error('Błąd ładowania postów:', error);
                document.getElementById('postsFeed').innerHTML = `
                    <div class="p-4 text-red-500">
                        <p>Błąd ładowania postów. Sprawdź połączenie z serwerem.</p>
                    </div>
                `;
            }
        }

        async function submitPost() {
            const content = document.getElementById('postContent').value.trim();
            
            if (!content) {
                showToast('Napisz coś przed wysłaniem!', 'error');
                return;
            }

            if (!currentUser) {
                showToast('Musisz się zalogować', 'error');
                return;
            }

            const btn = document.getElementById('postBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';

            try {
                await pb.collection('posts').create({
                    content: content,
                    author: currentUser.id
                });

                document.getElementById('postContent').value = '';
                showToast('Post wysłany!', 'success');
                loadPosts();
            } catch (error) {
                console.error('Błąd wysyłania posta:', error);
                showToast('Błąd wysyłania: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Posta!';
            }
        }

        function discardPost() {
            if (confirm('Na pewno chcesz anulować post?')) {
                document.getElementById('postContent').value = '';
            }
        }

        // ==================== Utilities ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.remove('hidden', 'bg-green-500', 'bg-red-500', 'bg-blue-500');
            
            if (type === 'error') {
                toast.classList.add('bg-red-500');
            } else if (type === 'success') {
                toast.classList.add('bg-green-500');
            } else {
                toast.classList.add('bg-blue-500');
            }
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function navigateTo(page) {
            console.log('Navigate to:', page);
            // Placeholder for navigation
        }

        function toggleMobileMenu() {
            // Placeholder for mobile menu toggle
            alert('Menu na urządzeniach mobilnych - w przygotowaniu');
        }

        // ==================== Initialize ====================
        document.addEventListener('DOMContentLoaded', initPocketBase);
    </script>
</body>
</html>
